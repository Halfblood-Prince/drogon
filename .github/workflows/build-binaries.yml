name: Build Drogon binaries

on:
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - artifact_name: aerosentinel-linux-x64
            os: ubuntu-24.04
            triplet: x64-linux
            build_type: Release
          - artifact_name: aerosentinel-linux-arm64
            os: ubuntu-24.04-arm
            triplet: arm64-linux
            build_type: Release
          - artifact_name: aerosentinel-windows-x64
            os: windows-2025
            triplet: x64-windows
            cmake_arch: x64
            build_type: Release
          - artifact_name: aerosentinel-windows-arm64
            os: windows-11-arm
            triplet: arm64-windows
            cmake_arch: ARM64
            build_type: Release
          - artifact_name: aerosentinel-macos-x64
            os: macos-15-intel
            triplet: x64-osx
            build_type: Release
          - artifact_name: aerosentinel-macos-arm64
            os: macos-15
            triplet: arm64-osx
            build_type: Release

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Clone vcpkg
        shell: pwsh
        run: git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          if ($IsWindows) {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.bat" -disableMetrics
          } else {
            & "$env:VCPKG_ROOT/bootstrap-vcpkg.sh" -disableMetrics
          }
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Configure
        shell: pwsh
        run: |
          $args = @(
            "-S", ".",
            "-B", "build",
            "-DCMAKE_TOOLCHAIN_FILE=$env:VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake",
            "-DVCPKG_TARGET_TRIPLET=${{ matrix.triplet }}"
          )

          if ($IsWindows) {
            $args += @("-A", "${{ matrix.cmake_arch }}")
          } else {
            $args += "-DCMAKE_BUILD_TYPE=${{ matrix.build_type }}"
          }

          cmake @args
        env:
          VCPKG_ROOT: ${{ github.workspace }}/vcpkg

      - name: Build
        shell: pwsh
        run: cmake --build build --config "${{ matrix.build_type }}" --parallel

      - name: Install package layout
        shell: pwsh
        run: cmake --install build --config "${{ matrix.build_type }}" --prefix "dist/${{ matrix.artifact_name }}"

      - name: Upload compiled binary
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.artifact_name }}

  package-windows-installer:
    name: aerosentinel-windows-installer
    needs: build
    runs-on: windows-2025

    steps:
      - name: Check out installer source
        uses: actions/checkout@v6

      - name: Download Windows x64 payload
        uses: actions/download-artifact@v8
        with:
          name: aerosentinel-windows-x64
          path: installer-package/payload/x64

      - name: Download Windows arm64 payload
        uses: actions/download-artifact@v8
        with:
          name: aerosentinel-windows-arm64
          path: installer-package/payload/arm64

      - name: Assemble architecture-aware installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item installer/windows/install-aerosentinel.ps1 installer-package/install-aerosentinel.ps1 -Force
          Copy-Item installer/windows/install-aerosentinel.cmd installer-package/install-aerosentinel.cmd -Force
          Copy-Item installer/windows/README.md installer-package/README.md -Force
          Compress-Archive -Path installer-package/* -DestinationPath dist/aerosentinel-windows-installer.zip -Force

      - name: Upload Windows installer
        uses: actions/upload-artifact@v7
        with:
          name: aerosentinel-windows-installer
          path: dist/aerosentinel-windows-installer.zip
